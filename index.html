<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="3Play — a creator-first, high-performance video platform." />
    <meta name="theme-color" content="#0B0D12" />
    <meta property="og:title" content="3Play" />
    <meta property="og:description" content="A creator-first, high-performance video platform." />
    <meta property="og:type" content="website" />
    <title>3Play</title>
    <style>
      :root{ 
        --bg: #07080b; 
        --accent: #e50914; 
      } 
      
      body { margin: 0; padding: 0; background: transparent; color: #fff; overflow-x: hidden; }

      /* LIVE WORLD BACKGROUND */
      #live-background {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: 
          radial-gradient(circle at 50% 50%, rgba(229, 9, 20, 0.15), transparent 60%),
          radial-gradient(circle at 80% 20%, rgba(20, 50, 200, 0.1), transparent 40%),
          linear-gradient(135deg, #020205 0%, #0d0e12 50%, #050508 100%);
        background-size: 200% 200%;
        animation: liveWorldPulse 15s ease infinite alternate;
        transition: filter 1.5s ease-in-out;
      }
      
      /* Subtle grid overlay for "AI System" feel */
      #live-background::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        opacity: 0.4;
      }

      /* State when intro is done */
      #live-background.blurred {
        filter: blur(20px) brightness(0.6);
      }

      /* INTRO CONTAINER */
      .intro { 
        position: fixed; 
        inset: 0; 
        z-index: 9999; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        background: #07080b; /* Covers full application */
      } 
      
      /* THE LOGO WRAPPER */
      .intro__logo-wrapper {
        position: relative;
        width: min(600px, 80vw);
        height: auto;
      }

      /* THE LOGO */
      .intro__logo {
        width: 100%;
        height: auto;
        opacity: 0;
        will-change: transform, opacity, filter;
        animation: logoEntrance 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* SHIMMER EFFECT */
      .intro__logo-wrapper::after {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.05) 40%,
          rgba(255, 255, 255, 0.4) 50%,
          rgba(255, 255, 255, 0.05) 60%,
          transparent 100%
        );
        transform: skewX(-20deg);
        animation: shimmerModern 2s infinite 1s;
        pointer-events: none;
        mix-blend-mode: overlay;
      }

      /* PULSE GLOW BEHIND LOGO */
      .intro__logo-wrapper::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60%;
        height: 60%;
        background: radial-gradient(circle, rgba(229, 9, 20, 0.6) 0%, transparent 70%);
        filter: blur(50px);
        opacity: 0;
        animation: pulseGlowModern 3s ease-in-out infinite alternate;
        z-index: -1;
      }

      /* Exit animation */ 
      .intro.is-hiding { 
        pointer-events: none;
        animation: introExitModern 0.6s cubic-bezier(0.7, 0, 0.3, 1) forwards;
      }
      
      .intro.is-hiding .intro__logo {
        animation: logoExitModern 0.5s cubic-bezier(0.5, 0, 0.2, 1) forwards;
      }

      /* Keyframes */ 
      @keyframes shimmerModern {
        0% { left: -150%; opacity: 0; }
        40% { opacity: 1; }
        100% { left: 150%; opacity: 0; }
      }

      @keyframes pulseGlowModern {
        0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.9); }
        100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.3); }
      }

      @keyframes logoEntrance {
        0% { 
          opacity: 0; 
          transform: scale(0.8) translateY(20px); 
          filter: blur(10px);
        }
        40% { 
          opacity: 1; 
          transform: scale(1.05) translateY(0); 
          filter: blur(0);
        }
        100% { 
          transform: scale(1);
          filter: drop-shadow(0 0 30px rgba(229,9,20,0.5));
        }
      }
      
      @keyframes logoExitModern {
        0% { opacity: 1; transform: scale(1); filter: blur(0); }
        100% { opacity: 0; transform: scale(1.2); filter: blur(20px); }
      }

      @keyframes introExitModern {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }

      @keyframes liveWorldPulse {
        0% { background-position: 0% 0%; }
        100% { background-position: 100% 100%; }
      }

      @media (prefers-reduced-motion: reduce){ 
        * { animation: none !important; transition: none !important; } 
      } 
    </style>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <!-- Live World Background (Persistent) -->
    <div id="live-background"></div>

    <!-- Intro Loader --> 
    <div id="introLoader" class="intro"> 
      <div class="intro__logo-wrapper">
        <img 
          src="/src/assets/branding/logo_1600x400.png" 
          alt="3Play Logo" 
          class="intro__logo"
        />
      </div>
    </div> 
    
    <!-- Initial Loader Script -->
    <script>
    (() => {
      const el = document.getElementById("introLoader");
      const bg = document.getElementById("live-background");

      // Minimum duration to ensure animation is seen
      const MIN_SHOW_MS = 2000; 
      const EXIT_MS = 600; 

      const t0 = performance.now(); 
      let doneCalled = false; 

      function hide(){ 
        if (!el) return;
        
        // Ensure we respect the minimum timer
        const elapsed = performance.now() - t0; 
        const remaining = Math.max(0, MIN_SHOW_MS - elapsed);

        setTimeout(() => {
          // Trigger exit animations
          el.classList.add("is-hiding");
          if (bg) bg.classList.add("blurred");

          // Remove intro DOM element after exit animation
          setTimeout(() => { 
            el.remove(); 
          }, EXIT_MS);
        }, remaining);
      } 

      function done(){ 
        if (doneCalled) return; 
        doneCalled = true; 
        hide();
      } 

      window.IntroLoader = { done }; 
      
      // Fallback in case app fails to load
      setTimeout(() => {
        if (!doneCalled) done();
      }, 8000);

    })(); 
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
