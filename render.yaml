services:
  - type: web
    name: 3play
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: MONGODB_URI
        fromGroup: shared-secrets
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_URL
        fromGroup: shared-secrets
      - key: RESEND_API_KEY
        fromGroup: shared-secrets
      - key: APP_ORIGIN
        value: https://3play.cz # Custom domain
